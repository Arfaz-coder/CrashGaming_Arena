<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<a href="index.html" class="back-home-btn">&#8592; Back</a>
<div class="game-page">
  <img id="gameIcon" src="" class="game-icon">
  <h1 id="gameTitle"></h1>
  <button id="playBtn">Play Now</button>

  <div class="screenshots" style="display:flex;overflow-x:auto;gap:10px;margin-top:15px;">
    <img id="s1" src="" alt="s1">
    <img id="s2" src="" alt="s2">
    <img id="s3" src="" alt="s3">
    <img id="s4" src="" alt="s4">
  </div>

  <div class="game-details">
    <h3>About This Game</h3>
    <p id="gameDesc"></p>
  </div>
</div>

<footer>
<p>Created by YourName | Gaming Hub 2025</p>
</footer>

<script src="cursor.js"></script>
<script>
if(localStorage.getItem("theme") !== "light"){
  document.body.classList.add("dark-mode");
}

function attachImageFallback(imgEl, candidates){
  if(!imgEl || !Array.isArray(candidates) || candidates.length === 0) return;
  let index = 0;
  imgEl.src = candidates[index];
  imgEl.onerror = ()=>{
    index += 1;
    if(index < candidates.length){
      imgEl.src = candidates[index];
    } else {
      imgEl.onerror = null;
    }
  };
}

function buildIconCandidatesFromName(name){
  const n = (name || "").trim();
  const lower = n.toLowerCase();
  return [...new Set([
    `${n}.jpg`, `${lower}.jpg`,
    `${n}.png`, `${lower}.png`,
    `${n}.jpeg`, `${lower}.jpeg`
  ])];
}

function buildScreenshotCandidates(iconCandidates, shotNumber){
  const extOrder = ["jpg", "png", "jpeg"];
  const list = [];

  (iconCandidates || []).forEach(path=>{
    const cleanPath = String(path || "").split("?")[0];
    const file = cleanPath.split("/").pop() || "";
    if(!file) return;
    const hasExt = file.includes(".");
    const base = hasExt ? file.substring(0, file.lastIndexOf(".")) : file;
    const lowerBase = base.toLowerCase();
    const ext = hasExt ? file.substring(file.lastIndexOf(".") + 1).toLowerCase() : "jpg";

    [ext, ...extOrder.filter(e=>e !== ext)].forEach(candidateExt=>{
      list.push(`${base}-s${shotNumber}.${candidateExt}`);
      list.push(`${lowerBase}-s${shotNumber}.${candidateExt}`);
    });
  });

  return [...new Set(list)];
}

const game = JSON.parse(localStorage.getItem("selectedGame"));
if(game){
  document.getElementById("gameTitle").innerText = game.name;
  document.getElementById("gameDesc").innerText = game.desc;
  const iconCandidates = (game.iconCandidates && game.iconCandidates.length)
    ? game.iconCandidates
    : (game.icon ? [game.icon] : buildIconCandidatesFromName(game.name));
  const gameIconEl = document.getElementById("gameIcon");
  attachImageFallback(gameIconEl, iconCandidates);

  for(let i=1;i<=4;i++){
    const imgEl = document.getElementById("s"+i);
    const screenshotCandidates = buildScreenshotCandidates(iconCandidates, i);
    attachImageFallback(imgEl, [...screenshotCandidates, ...iconCandidates]);
    imgEl.alt = `${game.name} preview ${i}`;
  }

  const playBtn = document.getElementById("playBtn");
  if(!game.url){
    playBtn.innerText = "Link Coming Soon";
    playBtn.disabled = true;
    playBtn.style.opacity = "0.65";
    playBtn.style.cursor = "not-allowed";
  } else {
    playBtn.onclick = ()=>{
      window.location.href = "play.html";
    };
  }
}
</script>
</body>
</html>
